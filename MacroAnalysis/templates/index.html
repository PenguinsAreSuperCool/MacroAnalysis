{% extends "layout.html" %}

{% block title %}
    Map
{% endblock %}
{% block main %}

    <div class="map-container">
        <div class="text-center">
            <h1><a href="/">MacroAnalysis</a></h1>
        </div>
        <div class="text-center">
            <form id="country_form" action="/country" method="post" class="text-center">
                <input type="hidden" name="country" id="country">
                <label for="start_year">Start Year:</label>
                <input type="number" id="start_year" name="start_year" value="1960">
                <label for="end_year">End Year:</label>
                <input type="number" id="end_year" name="end_year" value="2023">
                <span id="year-warning" style="color: white; font-size: 0.9em; display: none;">
                    (maximum: {{ current_year - 2 }})
                </span>
                <details style="color: white; margin-top: 10px;">
                    <summary>Select data to display:</summary>
                    <div class="indicator-grid">
                        {% for indicator in valid_indicators %}
                            <label>
                                <input type="checkbox" name="indicators" value="{{ indicator }}">
                                {{ indicator.replace('_', ' ').title() }}
                            </label>
                        {% endfor %}
                    </div>
                </details>
            </form>
        </div>
        <div id="map"></div>
    </div>

    <div id="confirm-box" style="display:none; position:fixed; 
         background-color:#222; padding:20px; border-radius:8px; color:white; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:1000;">
        <p id="confirm-text">Do you want to view data for this country?</p>
        <button id="confirm-yes" style="margin-right: 10px;">Yes</button>
        <button id="confirm-no">No</button>
    </div>
    <div class="button-search">
        <label for="country_search">Or search for a country:</label>
        <input type="text" id="country_search" placeholder="Type country name">
        <button type="button" onclick="searchCountry()" class="btn btn-secondary">Select</button>
    </div>
    <div class="text-center">
        <a href="/compare" class="btn btn-primary">Compare Countries</a>
        <a href="/" class="btn btn-primary">Home</a>
    </div>

    <script>
    // Initialize the map
    const map = L.map('map').setView([20, 0], 3); // center of the world

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    
    let selectedCountry = "";

    map.on('click', function(e) {
        const { lat, lng } = e.latlng;

        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
            .then(res => res.json())
            .then(data => {
                selectedCountry = data.address.country;
                const countryCode = data.address.country_code.toUpperCase();
                document.getElementById('country').value = countryCode;
                document.getElementById('confirm-text').textContent = `Do you want to view data for ${selectedCountry}?`;
                const mapPoint = map.latLngToContainerPoint(e.latlng);
                const box = document.getElementById('confirm-box');
                box.style.left = `${mapPoint.x}px`;
                box.style.top = `${mapPoint.y}px`;
                box.style.display = 'block';
            });
    });

    function searchCountry() {
        const query = document.getElementById('country_search').value;
        if (!query) return;

        fetch(`https://nominatim.openstreetmap.org/search?country=${encodeURIComponent(query)}&format=json&limit=1`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const { lat, lon } = data[0];

                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                        .then(res => res.json())
                        .then(reverseData => {
                            const countryCode = reverseData.address.country_code.toUpperCase();
                            const countryName = reverseData.address.country;

                            if (countryCode) {
                                document.getElementById('country').value = countryCode;
                                document.getElementById('confirm-text').textContent = `Do you want to view data for ${countryName}?`;
                                const box = document.getElementById('confirm-box');
                                box.style.left = '50%';
                                box.style.top = '30%';
                                box.style.transform = 'translate(-50%, -50%)';
                                box.style.display = 'block';
                            } else {
                                alert("Could not find a valid country code.");
                            }
                        });
                } else {
                    alert("Country not found. Please try again.");
                }
            })
            .catch(() => alert("Error occurred during search."));
    }

    document.getElementById('confirm-yes').onclick = function() {
        document.getElementById('country_form').submit();
    };

    document.getElementById('confirm-no').onclick = function() {
        document.getElementById('confirm-box').style.display = 'none';
    };
    </script>
    <script>
        const maxYear = {{ current_year - 2 }};
        const endYearInput = document.getElementById('end_year');
        const yearWarning = document.getElementById('year-warning');

        endYearInput.addEventListener('input', function () {
            if (parseInt(this.value) > maxYear) {
                yearWarning.style.display = 'inline';
            } else {
                yearWarning.style.display = 'none';
            }
        });
    </script>
{% endblock %}
