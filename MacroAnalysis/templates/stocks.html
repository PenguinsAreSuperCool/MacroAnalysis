{% extends "layout.html" %}

{% block title %}
    Stock Search
{% endblock %}
{% block main %}
    <div class="text-center">
        <h1><a href="/">MacroAnalysis</a></h1>
    </div>
     <!-- TODO: Add whole logic lol-->
    <form action="/stocks/stock" method="post" class="button-search">
        <div class="button-search" style="margin: 80px;">
            <label for="country_search">Stock Search: </label>
            <input type="text" name="stock" placeholder="Type stock symbol" style="width: 60%; padding: 0.4em; border-radius: 5px;">
            <button type="submit" class="btn btn-secondary" style="margin-left: 0.5em;">Select</button>
        </div>
        <div style="margin-top: 20px;">
            <strong>Frequent Searches:</strong>
            <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                <a href="/stocks/stock?symbol=AAPL" class="btn btn-outline-primary btn-sm">AAPL</a>
                <a href="/stocks/stock?symbol=TSLA" class="btn btn-outline-primary btn-sm">TSLA</a>
                <a href="/stocks/stock?symbol=GOOGL" class="btn btn-outline-primary btn-sm">GOOGL</a>
                <a href="/stocks/stock?symbol=AMZN" class="btn btn-outline-primary btn-sm">AMZN</a>
                <a href="/stocks/stock?symbol=MSFT" class="btn btn-outline-primary btn-sm">MSFT</a>
            </div>
        </div>
    </form>

{% endblock %}
