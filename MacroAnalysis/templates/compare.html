{% extends "layout.html" %}

{% block title %}
    Compare
{% endblock %}
{% block main %}

    <div class="map-container">
        <div class="text-center">
            <h1><a href="/">MacroAnalysis</a></h1>
        </div>
        <div class="text-center">
            <form id="country_form" action="/compare/country" method="post" class="text-center">
                <input type="hidden" name="country1" id="country1">
                <input type="hidden" name="country2" id="country2">
                <input type="hidden" name="country3" id="country3">
                <input type="hidden" name="country4" id="country4">
                <input type="hidden" name="country5" id="country5">
                <input type="hidden" name="country6" id="country6">
                <input type="hidden" name="country7" id="country7">
                <input type="hidden" name="country8" id="country8">
                <input type="hidden" name="country9" id="country9">
                <input type="hidden" name="country10" id="country10">
                <label for="start_year">Start Year:</label>
                <input type="number" id="start_year" name="start_year" value="1960">
                <label for="end_year">End Year:</label>
                <input type="number" id="end_year" name="end_year" value="2023">
                <span id="year-warning" style="color: white; font-size: 0.9em; display: none;">
                    (maximum: {{ current_year - 2 }})
                </span>
                <details style="color: white; margin-top: 10px;">
                    <summary>Select data to display:</summary>
                    <div style="margin: 10px 0;">
                        <input type="text" id="indicatorSearch" placeholder="Search indicators..." style="width: 100%; padding: 5px;">
                    </div>
                    <div class="indicator-grid" id="indicatorList">
                        {% for indicator in valid_indicators | sort %}
                            <label>
                                <input type="checkbox" name="indicators" value="{{ indicator }}">
                                {{ indicator.replace('_', ' ').title() }}
                            </label>
                        {% endfor %}
                    </div>
                </details>
                <div style="margin-top: 10px;">
                    <button type="submit" class="btn btn-primary">Compare Countries</button>
                </div>
            </form>
        </div>
        <div id="selected-countries" style="margin: 20px auto; max-width: 600px; text-align: center;"></div>
        <div id="map" class="compare-map"></div>

        <div class="button-search">
            <label for="country_search">Or search for a country:</label>
            <input type="text" id="country_search" placeholder="Type country name" style="width: 60%; padding: 0.4em; border-radius: 5px;">
            <button type="button" onclick="searchCountry()" class="btn btn-secondary" style="margin-left: 0.5em;">Select</button>
        </div>
        <div class="text-center" style="margin-bottom: 10px;">
            <button onclick="toggleMapTheme()" class="btn btn-secondary">I make dubious choices</button>
        </div>
        <div class="text-center">
            <a href="/map" class="btn btn-primary">Back to Map</a>
            <a href="/" class="btn btn-primary">Home</a>
        </div>
    </div>

    <script>
    // Initialize the map
    const map = L.map('map').setView([20, 0], 3); // center of the world

    // Add OpenStreetMap tiles
    let currentTheme = 'dark_all';
    let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    function toggleMapTheme() {
        map.removeLayer(tileLayer);
        if (currentTheme === 'dark_all') {
            currentTheme = 'voyager';
            tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        } else {
            currentTheme = 'dark_all';
            tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }
    }
    
    let selectedCountries = [];

    function highlightFeature(e) {
        const layer = e.target;
        if (!selectedCountries.includes(layer.feature.properties.ISO_A2)) {
            layer.setStyle({
                weight: 2,
                color: '#f0f',
                fillOpacity: 0.5
            });
        }
    }

    function resetHighlight(e) {
        const layer = e.target;
        if (!selectedCountries.includes(layer.feature.properties.ISO_A2)) {
            geojson.resetStyle(layer);
        }
    }

    function setSelectedStyle(layer) {
        layer.setStyle({
            weight: 2,
            color: '#0f0',
            fillOpacity: 0.6
        });
    }

    function onEachFeature(feature, layer) {
        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight,
            click: function(e) {
                const code = feature.properties.ISO_A2;
                const name = feature.properties.ADMIN;

                if (!selectedCountries.includes(code)) {
                    selectedCountries.push(code);
                    setSelectedStyle(layer);

                    const fields = ['country1','country2','country3','country4','country5','country6','country7','country8','country9','country10'];
                    for (let field of fields) {
                        const input = document.getElementById(field);
                        if (!input.value) {
                            input.value = code;

                            const btn = document.createElement("button");
                            btn.textContent = name + " ✕";
                            btn.className = "btn btn-sm btn-danger";
                            btn.style.margin = "5px";
                            btn.onclick = function() {
                                input.value = "";
                                btn.remove();
                                selectedCountries = selectedCountries.filter(c => c !== code);
                                geojson.eachLayer(l => {
                                    if (l.feature.properties.ISO_A2 === code) {
                                        geojson.resetStyle(l);
                                    }
                                });
                            };
                            document.getElementById("selected-countries").appendChild(btn);
                            break;
                        }
                    }
                }
            }
        });
    }

    let geojson;
    fetch("/static/data/countries.geo.json")
        .then(res => res.json())
        .then(data => {
            geojson = L.geoJson(data, {
                style: {
                    fillColor: '#444',
                    weight: 1,
                    color: '#888',
                    fillOpacity: 0
                },
                onEachFeature: onEachFeature
            }).addTo(map);
        });

    function searchCountry() {
        const query = document.getElementById('country_search').value;
        if (!query) return;

        fetch(`https://nominatim.openstreetmap.org/search?country=${encodeURIComponent(query)}&format=json&limit=1`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const { lat, lon } = data[0];

                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                        .then(res => res.json())
                        .then(reverseData => {
                            const countryCode = reverseData.address.country_code.toUpperCase();
                            const countryName = reverseData.address.country;

                            if (countryCode) {
                                const fields = ['country1','country2','country3','country4','country5','country6','country7','country8','country9','country10'];
                                for (let field of fields) {
                                    const input = document.getElementById(field);
                                    if (!input.value) {
                                        input.value = countryCode;

                                        const btn = document.createElement("button");
                                        btn.textContent = countryName + " ✕";
                                        btn.className = "btn btn-sm btn-danger";
                                        btn.style.margin = "5px";
                                        btn.onclick = function() {
                                            input.value = "";
                                            btn.remove();
                                        };
                                        document.getElementById("selected-countries").appendChild(btn);
                                        break;
                                    }
                                }
                            } else {
                                alert("Could not find a valid country code.");
                            }
                        });
                } else {
                    alert("Country not found. Please try again.");
                }
            })
            .catch(() => alert("Error occurred during search."));
    }
    document.getElementById('indicatorSearch').addEventListener('input', function () {
        const filter = this.value.toLowerCase();
        const labels = document.querySelectorAll('#indicatorList label');
        labels.forEach(label => {
            const text = label.textContent.toLowerCase();
            label.style.display = text.includes(filter) ? '' : 'none';
        });
    });
    const MAX_WORKLOAD = 100;
 
    function calculateWorkload() {
        const numIndicators = document.querySelectorAll('input[name="indicators"]:checked').length;
 
        let numCountries = 0;
        const countryFields = ["country1", "country2", "country3", "country4", "country5", "country6", "country7", "country8", "country9", "country10"];
        countryFields.forEach(field => {
            const val = document.getElementById(field);
            if (val && val.value) numCountries++;
        });
 
        return numIndicators * numCountries;
    }
 
    function validateForm() {
        const workload = calculateWorkload();
        if (workload > MAX_WORKLOAD) {
            alert("Too much data selected. Please reduce the number of indicators or countries.");
            return false;
        }
        return true;
    }
 
    // Attach to form
    const form = document.getElementById("country_form");
    if (form) {
        form.onsubmit = function () {
            return validateForm();
        };
    }
    const maxYear = {{ current_year - 2 }};
    const endYearInput = document.getElementById('end_year');
    const yearWarning = document.getElementById('year-warning');

    endYearInput.addEventListener('input', function () {
        if (parseInt(this.value) > maxYear) {
            yearWarning.style.display = 'inline';
        } else {
            yearWarning.style.display = 'none';
        }
    });

    </script>
{% endblock %}
